name: documentation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Install pandoc
        run: sudo apt-get install -y pandoc

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sphinx sphinx-rtd-theme nbsphinx sphinx-copybutton pandoc
          pip install jupyter nbconvert ipykernel
          pip install numpy scipy astropy matplotlib dynesty ldtk
          pip install .

      - name: Install SOAP
        run: |
          git clone https://github.com/EduardoCristo/SOAP-Spot-Oscillation-And-Planet-code.git
          pip install ./SOAP-Spot-Oscillation-And-Planet-code

      - name: Copy SOAP data files
        run: |
          SITEPKG=$(python -c "import site; print(site.getsitepackages()[0])")
          cp -r SOAP-Spot-Oscillation-And-Planet-code/SOAP/solarCCFs $SITEPKG/SOAP/

      - name: Execute notebooks
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute docs/source/examples/HD189733_example.ipynb \
            --output docs/source/examples/HD189733_example.ipynb

      - name: Build documentation
        working-directory: docs
        run: make html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: docs/build/html
          force_orphan: true